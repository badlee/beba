<!DOCTYPE html>
<html>

<head>
    <title>Global SSE Example</title>
</head>

<body>
    <h1>Global Events</h1>
    <div id="messages"></div>

    <script server>
        const sse = require("sse");
        const storage = require("storage");

        // Broadcast a notification to the 'global' channel via the new high-performance Sharded Hub
        sse.publish("notification", "Someone visited the global page at " + new Date().toLocaleTimeString());

        // Also increment a global counter
        if (storage.shared.num.undefined("visits")) {
            storage.shared.num.define("visits", 0);
        }
        storage.shared.num.incr("visits", 1);
        var totalVisits = storage.shared.num.get("visits");
    </script>

    <p>Total page visits: <span visits>{{totalVisits}}</span></p>

    <script>
        const evtSource = new EventSource("/events");
        evtSource.addEventListener("notification", (event) => {
            const newElement = document.createElement("li");
            newElement.textContent = "Global: " + event.data;
            document.getElementById("messages").appendChild(newElement);
        });
    </script>
</body>

</html>
