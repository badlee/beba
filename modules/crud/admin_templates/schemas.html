<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h4 mb-0 fw-bold">Collections (Schemas)</h2>
  <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#newSchemaModal">
    <i class="bi bi-plus-lg me-2"></i> New Collection
  </button>
</div>

<div class="card border-0 shadow-sm overflow-hidden">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="bg-light-subtle">
        <tr>
          <th class="ps-4">Collection Name</th>
          <th>Slug</th>
          <th>Description</th>
          <th class="text-center">Documents</th>
          <th class="text-end pe-4" style="width: 154px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <?js var parsedSchemas = JSON.parse(settings.schemas || '[]') || []; ?>
        {{#parsedSchemas}}
        <tr>
          <td class="ps-4">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded-3 p-2 d-flex align-items-center justify-content-center" style="background-color: {{color}}22; color: {{color}}; width: 36px; height: 36px;">
                <i class="bi bi-{{icon}}"></i>
              </div>
              <span class="fw-bold text-main">{{name}}</span>
            </div>
          </td>
          <td><span class="badge bg-light text-dark border font-monospace">{{slug}}</span></td>
          <td><small class="text-muted">{{description}}</small></td>
          <td class="text-center"><span class="badge rounded-pill bg-light text-primary border">{{doc_count}}</span></td>
          <td class="text-end pe-4">
            <div class="btn-group">
              <a href="{{adminPrefix}}/collections/{{slug}}" 
                 hx-get="{{adminPrefix}}/collections/{{slug}}" 
                 hx-target="#main-content" 
                 hx-push-url="true"
                 class="btn btn-sm btn-outline-primary border-0" title="View Documents">
                <i class="bi bi-eye"></i>
              </a>
              <button class="btn btn-sm btn-outline-secondary border-0" 
                data-bs-toggle="modal" data-bs-target="#editSchemaModal"
                onclick="fillEditSchemaModal('{{id}}', '{{name}}', '{{slug}}', '{{description}}', '{{icon}}', '{{color}}')">
                <i class="bi bi-gear"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger border-0"
                hx-delete="{{apiPrefix}}/schemas/{{id}}"
                hx-target="closest tr" hx-swap="outerHTML"
                hx-confirm="Delete this collection and all its documents?">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
        {{/parsedSchemas}}
        {{^parsedSchemas}}
        <tr>
          <td colspan="5" class="text-center py-5 text-muted">
            <i class="bi bi-folder-x fs-1 opacity-25"></i>
            <p class="mt-2">No collections in this namespace.</p>
          </td>
        </tr>
        {{/parsedSchemas}}
      </tbody>
    </table>
  </div>
</div>

<!-- New Schema Modal -->
<div class="modal fade" id="newSchemaModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Add New Collection</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form hx-post="{{apiPrefix}}/schemas" hx-on::after-request="if(event.detail.successful){htmx.ajax('GET', '{{adminPrefix}}/collections', {target:'#main-content', pushUrl:false})}">
        <div class="modal-body">
          <input type="hidden" name="namespace_id" value="{{activeNamespace}}">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Name</label>
            <input name="name" class="form-control" placeholder="Users, Posts, Products..." required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Slug</label>
            <input name="slug" class="form-control font-monospace" placeholder="users" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Description</label>
            <input name="description" class="form-control" placeholder="Short description of the data.">
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label small fw-bold text-muted">Icon (Bootstrap)</label>
              <input name="icon" class="form-control" value="file-earmark-text">
            </div>
            <div class="col-6">
              <label class="form-label small fw-bold text-muted">Color (Hex)</label>
              <input name="color" type="color" class="form-control form-control-color w-100" value="#4A6CF7">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary px-4 fw-bold">Create Collection</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Edit Schema Modal -->
<div class="modal fade" id="editSchemaModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Edit Collection Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editSchemaForm" hx-put="" hx-on::after-request="if(event.detail.successful){location.reload()}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Name</label>
            <input name="name" id="edit-schema-name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Slug</label>
            <input name="slug" id="edit-schema-slug" class="form-control font-monospace" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Description</label>
            <input name="description" id="edit-schema-desc" class="form-control">
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label small fw-bold text-muted">Icon</label>
              <input name="icon" id="edit-schema-icon" class="form-control">
            </div>
            <div class="col-6">
              <label class="form-label small fw-bold text-muted">Color</label>
              <input name="color" id="edit-schema-color" type="color" class="form-control form-control-color w-100">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary px-4 fw-bold">Save Settings</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function fillEditSchemaModal(id, name, slug, desc, icon, color) {
  const form = document.getElementById('editSchemaForm');
  form.setAttribute('hx-put', '{{apiPrefix}}/schemas/' + id);
  document.getElementById('edit-schema-name').value = name;
  document.getElementById('edit-schema-slug').value = slug;
  document.getElementById('edit-schema-desc').value = desc;
  document.getElementById('edit-schema-icon').value = icon;
  document.getElementById('edit-schema-color').value = color;
  htmx.process(form);
}

// Auto-open edit modal if ?edit=ID is present
window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const editId = urlParams.get('edit');
  if (editId) {
    const schemas = JSON.parse('{{{ schemas }}}' || '[]');
    const s = schemas.find(x => x.id === editId);
    if (s) {
      fillEditSchemaModal(s.id, s.name, s.slug, s.description, s.icon, s.color);
      const modal = new bootstrap.Modal(document.getElementById('editSchemaModal'));
      modal.show();
    }
  }
});
</script>
