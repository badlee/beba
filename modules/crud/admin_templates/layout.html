<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}} — CRUD Admin</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <style>
    {{{ css }}}
  </style>

  <!-- JS Dependencies -->
  <script src="https://unpkg.com/htmx.org/htmx.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse/sse.js"></script>
</head>

<body class="bg-light">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-cpu-fill"></i>
      <span>CRUD Admin</span>
    </div>
    <div class="sidebar-nav">
      <script server>
        var parsedMenu = JSON.parse(settings.menu || '[]') || [];
      </script>
      {{#parsedMenu}}
      <a class="nav-item{{#active}} active{{/active}}" href="{{path}}" 
         hx-get="{{path}}" hx-target="#main-content" hx-push-url="true"
         {{#external}} target="_blank" rel="noopener" {{/external}}>
        <i class="nav-icon bi bi-{{#icon}}{{icon}}{{/icon}}{{^icon}}circle-fill{{/icon}}"></i>
        <span>{{title}}</span>
        {{#badge}}<span class="ms-auto badge rounded-pill bg-primary" style="font-size: 10px;">{{badge}}</span>{{/badge}}
      </a>
      {{/parsedMenu}}
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <!-- Header -->
    <header class="header">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link text-muted p-0 d-lg-none" id="sidebar-toggle">
          <i class="bi bi-list fs-3"></i>
        </button>
        
        <!-- Namespace Selector -->
        <div class="dropdown me-2">
          <button class="btn btn-light btn-sm dropdown-toggle d-flex align-items-center gap-2 border-0 shadow-sm px-3 py-2 rounded-3" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-layers text-primary"></i>
            <span class="fw-bold small" id="active-ns-name">Loading...</span>
          </button>
          <ul class="dropdown-menu border-0 shadow-lg mt-2 py-2" style="min-width: 200px;" id="ns-dropdown">
            <!-- Namespaces injected here -->
          </ul>
        </div>

        <nav aria-label="breadcrumb" class="d-none d-md-block">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="{{adminPrefix}}" hx-get="{{adminPrefix}}" hx-target="#main-content" hx-push-url="true">Admin</a></li>
            <li id="breadcrumb-active" class="breadcrumb-item active" aria-current="page">{{pageTitle}}</li>
          </ol>
        </nav>
      </div>

      <div class="d-flex align-items-center gap-4">
        <!-- Theme Switcher -->
        <div class="theme-switcher">
          <button class="theme-btn" id="theme-light" title="Light Mode">
            <i class="bi bi-sun"></i>
          </button>
          <button class="theme-btn" id="theme-dark" title="Dark Mode">
            <i class="bi bi-moon"></i>
          </button>
          <button class="theme-btn" id="theme-system" title="System Theme">
            <i class="bi bi-laptop"></i>
          </button>
        </div>

        <!-- User Profile (Static for now) -->
        <div class="dropdown">
          <a href="#" class="d-flex align-items-center gap-2 text-decoration-none text-main" data-bs-toggle="dropdown">
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white" style="width: 38px; height: 38px; font-weight: 600;">
              A
            </div>
            <div class="d-none d-md-block">
              <div class="fw-semibold small lh-1">Admin</div>
              <div class="text-muted small">Root User</div>
            </div>
          </a>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow">
            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i> Profile</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{{adminPrefix}}/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main id="main-content" class="p-4 p-lg-5">
      {{{ content }}}
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      // ── Namespace Switcher ──
      const nsList = JSON.parse('{{{ namespaces }}}' || '[]');
      const activeNS = '{{ activeNamespace }}';
      const nsDropdown = document.getElementById('ns-dropdown');
      const activeNSName = document.getElementById('active-ns-name');
      const adminPrefix = '{{ adminPrefix }}';

      if (nsDropdown && nsList.length > 0) {
        nsList.forEach(ns => {
          const li = document.createElement('li');
          const isActive = ns.id === activeNS;
          if (isActive) activeNSName.textContent = ns.name;
          
          li.innerHTML = `
            <a class="dropdown-item d-flex align-items-center justify-content-between py-2 ${isActive ? 'active fw-bold' : ''}" href="${adminPrefix}/switch-ns/${ns.id}">
              <span>${ns.name}</span>
              ${isActive ? '<i class="bi bi-check2 ms-2"></i>' : ''}
              <div class="small text-muted font-monospace opacity-50 ms-3" style="font-size: 10px;">${ns.slug}</div>
            </a>
          `;
          nsDropdown.appendChild(li);
        });
        
        if (!activeNSName.textContent || activeNSName.textContent === 'Loading...') {
           activeNSName.textContent = 'Select Namespace';
        }
      }

      // ── Sidebar Toggle ──
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');
      if (toggle) {
        toggle.addEventListener('click', () => {
          sidebar.classList.toggle('show');
        });
      }

      // ── Theme Switcher Logic ──
      const html = document.documentElement;
      const themeBtns = {
        light: document.getElementById('theme-light'),
        dark: document.getElementById('theme-dark'),
        system: document.getElementById('theme-system')
      };

      function setTheme(theme, save = true) {
        let actualTheme = theme;
        if (theme === 'system') {
          actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        html.setAttribute('data-bs-theme', actualTheme);
        html.querySelector('body').setAttribute('class', 'bg-' + actualTheme);
        
        // Update UI
        Object.keys(themeBtns).forEach(k => themeBtns[k].classList.remove('active'));
        themeBtns[theme].classList.add('active');
        
        if (save) localStorage.setItem('crud-admin-theme', theme);
      }

      // Init theme
      const savedTheme = localStorage.getItem('crud-admin-theme') || 'system';
      setTheme(savedTheme, false);

      // Listeners
      themeBtns.light.onclick = () => setTheme('light');
      themeBtns.dark.onclick = () => setTheme('dark');
      themeBtns.system.onclick = () => setTheme('system');

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (localStorage.getItem('crud-admin-theme') === 'system') {
          setTheme('system', false);
        }
      });

      // ── SSE & Toasts ──
      var prefix = '{{ssePrefix}}';
      var es = new EventSource(prefix + '?channels=crud::create,crud::update,crud::delete,crud::login,crud::logout,crud::reject');
      
      es.addEventListener('crud', function (e) {
        try {
          var d = JSON.parse(e.data);
          showToast(d.action, d.schema || d.namespace || '', d.id || '');
          var evt = new CustomEvent('crud-event', { detail: d });
          document.dispatchEvent(evt);
        } catch (err) { }
      });

      function showToast(action, scope, id) {
        var container = document.getElementById('toast-container');
        var t = document.createElement('div');
        t.className = 'toast show';
        
        let colorClass = 'text-primary';
        if(action === 'create') colorClass = 'text-success';
        if(action === 'delete') colorClass = 'text-danger';
        if(action === 'update') colorClass = 'text-warning';

        t.innerHTML = `
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="fw-bold ${colorClass}">${action.toUpperCase()}</span>
            <small class="text-muted ms-auto">just now</small>
          </div>
          <div class="small">${scope ? scope + (id ? '/' + id.substring(0, 8) : '') : 'system'}</div>
        `;
        
        container.appendChild(t);
        setTimeout(() => {
          t.style.animation = 'fadeOut 0.3s ease forwards';
          setTimeout(() => t.remove(), 300);
        }, 5000);
      }

      // ── HTMX SPA Helpers ──
      document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'main-content') {
          // Update sidebar active state
          const currentPath = window.location.pathname;
          document.querySelectorAll('.sidebar-nav .nav-item').forEach(el => {
            if (el.getAttribute('href') === currentPath) {
              el.classList.add('active');
            } else {
              el.classList.remove('active');
            }
          });

          // Update breadcrumb active text (hacky but works if we don't send headers)
          // We can try to find an <h2> or similar in the new content
          const newTitle = evt.detail.target.querySelector('h2, h4, .page-title');
          if (newTitle) {
            document.getElementById('breadcrumb-active').textContent = newTitle.textContent.trim();
          }
        }
      });

      // Also handle initial load active state
      const currentPath = window.location.pathname;
      document.querySelectorAll('.sidebar-nav .nav-item').forEach(el => {
        if (el.getAttribute('href') === currentPath) el.classList.add('active');
      });
    })();
  </script>
</body>

</html>
