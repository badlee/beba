<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CRUD Admin</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    {{{ css }}}
    body {
      background-color: var(--bg-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 20px;
    }
    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--main-color);
      text-align: center;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="card login-card border-0 shadow-lg">
    <div class="login-logo">
      <i class="bi bi-cpu-fill"></i>
      <span>CRUD Admin</span>
    </div>
    
    <h4 class="fw-bold mb-1">Sign In</h4>
    <p class="text-muted small mb-4">Enter your credentials to access the root panel.</p>

    <form method="POST" action="{{adminPrefix}}/login">
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
          <input name="username" class="form-control border-start-0 ps-0" placeholder="admin" required autofocus>
        </div>
      </div>
      
      <div class="mb-4">
        <label class="form-label small fw-bold text-muted">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
          <input name="password" type="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">
        Sign In <i class="bi bi-arrow-right ms-2"></i>
      </button>

      {{#error}}
      <div class="alert alert-danger border-0 bg-danger-subtle text-danger small py-2 text-center rounded-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{error}}
      </div>
      {{/error}}
    </form>
    
    <div class="mt-4 text-center">
      <small class="text-muted">Protected by secure authentication.</small>
    </div>
  </div>

  <script>
    // System theme detection for login page
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-bs-theme', 'dark');
    }
  </script>
</body>
</html>
