<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h4 mb-0 fw-bold">Roles</h2>
  <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#newRoleModal">
    <i class="bi bi-shield-plus me-2"></i> New Role
  </button>
</div>

<div class="card border-0 shadow-sm overflow-hidden">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="bg-light-subtle">
        <tr>
          <th class="ps-4">Role Name</th>
          <th>Namespace ID</th>
          <th>Created</th>
          <th class="text-end pe-4" style="width: 100px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <?js var parsedRoles = JSON.parse(settings.roles || '[]') || []; ?>
        {{#parsedRoles}}
        <tr>
          <td class="ps-4">
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-shield-check text-primary"></i>
              <span class="fw-medium text-main">{{name}}</span>
            </div>
          </td>
          <td><span class="badge bg-light text-dark border font-monospace">{{namespace_id}}</span></td>
          <td><small class="text-muted">{{created_at}}</small></td>
          <td class="text-end pe-4">
            <button class="btn btn-sm btn-outline-danger border-0"
              hx-delete="{{apiPrefix}}/roles/{{id}}"
              hx-target="closest tr" hx-swap="outerHTML"
              hx-confirm="Are you sure you want to delete this role?">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
        {{/parsedRoles}}
        {{^parsedRoles}}
        <tr>
          <td colspan="4" class="text-center py-5 text-muted">
            <i class="bi bi-shield-slash fs-1 opacity-25"></i>
            <p class="mt-2">No roles defined yet.</p>
          </td>
        </tr>
        {{/parsedRoles}}
      </tbody>
    </table>
  </div>
</div>

<!-- New Role Modal -->
<div class="modal fade" id="newRoleModal" tabindex="-1" aria-labelledby="newRoleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="newRoleModalLabel">Create New Role</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form hx-post="{{apiPrefix}}/roles" hx-on::after-request="if(event.detail.successful){htmx.ajax('GET', '{{adminPrefix}}/roles', {target:'#main-content', pushUrl:false})}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Role Name</label>
            <input name="name" class="form-control" placeholder="e.g. editor" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Namespace ID</label>
            <input name="namespace_id" class="form-control font-monospace" placeholder="e.g. global">
            <div class="form-text tiny">Leave empty for global, or specify a valid namespace ID.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Permissions (JSON)</label>
            <textarea name="permissions" class="form-control font-monospace" rows="5" placeholder='[{"resource": "*", "actions": ["*"]}]'></textarea>
            <div class="form-text tiny">Format: JSON array of permission objects.</div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary px-4 fw-bold">Create Role</button>
        </div>
      </form>
    </div>
  </div>
</div>
